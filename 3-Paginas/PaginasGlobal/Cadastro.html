<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Workonnection</title>
  <link rel="stylesheet" href="/2-Style/styleCadastro.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="header">
  <img src="/6-Imagens/Logo Workonnection.png" alt="Logo" class="logo">
  <h1>Cadastro</h1>
</header>

<main class="cadastro-container">
  <section class="form-box">

    <h2>Dados Pessoais</h2>

    <!-- Feedback igual React -->
    <div id="feedback" class="feedback" style="display:none;"></div>

    <form id="cadastroForm">

      <div class="form-row">
        <div class="input-group">
          <label>Nome</label>
          <input name="nomeDadosPessoais" required>
        </div>

        <div class="input-group">
          <label>CPF</label>
          <input name="cpfDadosPessoais" required>
        </div>
      </div>

      <div class="form-row">
        <div class="input-group">
          <label>Data de Nascimento</label>
          <input type="date" name="dataNascimentoDadosPessoais" required>
        </div>

        <div class="input-group">
          <label>Telefone</label>
          <input name="telefoneDadosPessoais" required>
        </div>
      </div>

      <div class="form-row">
        <div class="input-group">
          <label>Email</label>
          <input type="email" name="emailDadosPessoais" required>
        </div>

        <div class="input-group">
          <label>Senha</label>
          <input type="password" name="senhaDadosPessoais" required>
        </div>
      </div>

      <p class="user-label">Tipo de Usuário</p>

      <div class="user-type-box">
        <button type="button" class="user-btn" data-tipo="empresa">EMPRESA</button>
        <button type="button" class="user-btn" data-tipo="me">ME</button>
        <button type="button" class="user-btn" data-tipo="mei">MEI</button>
        <button type="button" class="user-btn" data-tipo="estudante">ESTUDANTE</button>
      </div>

      <!-- Caixa dinâmica igual React -->
      <div id="tipoBox" class="user-box collapsible">
        <h3 id="tipoTitulo"></h3>
        <p>Campos específicos podem ser adicionados aqui futuramente.</p>
      </div>

      <div class="buttons">
        <button type="button" class="btn-back">Voltar</button>
        <button type="submit" class="btn-submit">Cadastrar</button>
      </div>

    </form>
  </section>
</main>

<script src="/3-Tipo-usuarios/cadastro.js"></script>

</body>
</html>
