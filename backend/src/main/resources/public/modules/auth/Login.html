<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Workonnection</title>

  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/auth/styleLogin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div class="login-container">

    <div class="left">
      <img src="https://www.netzpiloten.de/wp-content/uploads/2021/01/work-life-balance-home-office-1000x1000-1.jpg">
    </div>

    <div class="right">
      <div class="login-form-box">

        <img src="/imagens/logo_workonnection.png" class="logoLogin">

        <div id="feedback" class="feedback"></div>

        <form id="loginForm" novalidate>

          <!-- EMAIL -->
          <div class="input-group">
            <div class="input-wrapper">
              <i class="fa-solid fa-envelope input-icon"></i>
              <input type="email" id="email" placeholder="Digite seu E-mail" autocomplete="email">
            </div>
            <small class="error-message"></small>
          </div>

          <!-- SENHA -->
          <div class="input-group">
            <div class="input-wrapper">
              <i class="fa-solid fa-lock input-icon"></i>
              <input type="password" id="senha" placeholder="Digite sua Senha" autocomplete="current-password">
            </div>
            <small class="error-message"></small>
          </div>

          <button type="submit" class="btn-primary">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            Entrar
          </button>

        </form>

        <p class="cadastro">
          Não é cadastrado?
          <a href="/modules/auth/Cadastro.html">Cadastre-se</a>
        </p>

      </div>
    </div>

  </div>

  <script src="/js/auth/login.js"></script>
</body>
</html>
