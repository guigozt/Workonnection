<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkConnection - Mensagem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/chat/styleChat.css">
        
    <script src="/js/components/topbar.js" defer></script>
</head>
<body>
    <!-- Container principal -->
    <div class="chat-container">
        <div class="chat-header">
            <div class="profile-pic">
                <img src="https://tse2.mm.bing.net/th/id/OIP.SeCF8wr7PT_EmUGraph2_AHaHa?cb=12&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Tech Soluciones">
                <span class="status online"></span>
            </div>
            <div>
                <h5>Tech Soluciones</h5>
                <p>Online</p>
            </div>
        </div>

        <!-- Corpo do chat -->
        <div class="chat-body">
            <div class="mensagem recebida">
                <p><strong>Tech Soluciones:</strong> Olá! A equipe finalizou a primeira versão do conceito para o redesign do seu site. Está disponível no link que enviamos por e-mail. Gostaríamos do seu feedback.</p>
            </div>
        </div>

        <!-- Rodapé do chat -->
        <div class="chat-footer">
            <div class="input-area">
                <textarea id="mensagemInput" placeholder="Escreva uma mensagem"></textarea>
            </div>

            <div class="chat-actions">
                <i class="fas fa-paperclip" title="Anexar arquivo"></i>
                <i class="fas fa-image" title="Enviar imagem"></i>
            </div>

            <button class="enviar-btn">
                Enviar <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="/js/auth/auth.js"></script>

</body>
</html>
