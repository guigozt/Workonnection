<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkConnection - Colaboradores</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/colaboradores/styleColaboradores.css" />
    <script src="/js/components/topbar.js" defer></script>
  </head>
  <body>
    <!-- Envolvi novamente no wrapper para manter o alinhamento central -->
    <div class="colab-wrapper">
      <!-- Container de cards -->
      <div id="colaboradores-container" class="feed"></div>

      <!-- Mensagem de lista vazia -->
      <div id="sem-colaboradores" class="colab-vazio" style="display: none">
        <i class="fas fa-users-slash"></i>
        <p>Nenhum perfil encontrado.</p>
      </div>

      <!-- Botão Carregar Mais -->
      <div class="text-center mt-4 mb-5">
        <button class="btn-primary" id="btn-carregar-mais">Exibir tudo</button>
      </div>
    </div>
    <!-- Fim do colab-wrapper -->

    <script src="/js/auth/auth.js"></script>
    <script src="/js/colaboradores/colaboradores.js" defer></script>
  </body>
</html>
