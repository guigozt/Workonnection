<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkConnection - Configurações</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/configuracoes/styleConfiguracoes.css">
  <link rel="stylesheet" href="/css/global.css">

  <script src="/js/components/topbar.js" defer></script>
</head>
<body>
<div class="container-config">
  <h4>Configurações</h4>

  <!-- PERFIS -->
  <div class="card-config">
    <h5>Perfis</h5>
    <div id="containerPerfis"></div>

    <button id="btnAdicionarPerfil" class="btn btn-outline-success mt-2">
      + Adicionar perfil
    </button>
  </div>

  <!-- TEMA -->
  <div class="card-config">
    <h5>Tema</h5>
    <label><input type="radio" name="tema" value="claro"> Claro</label>
    <label><input type="radio" name="tema" value="escuro"> Escuro</label>
  </div>

  <!-- IDIOMA -->
  <div class="card-config">
    <h5>Idioma</h5>
    <select id="idiomaSelect" class="form-select" style="max-width: 200px;">
      <option value="pt">Português</option>
      <option value="en">English</option>
      <option value="es">Español</option>
    </select>
  </div>
</div>

</body>
</html>
