<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkConnection - Notificações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/notificacoes/styleNotificacao.css">
    <script src="/js/components/topbar.js" defer></script>
</head>
<body>

<div class="notif-wrapper">

    <div class="notif-header">
        <h5>Notificações</h5>
        <div class="notif-header-acoes">
            <button id="btnMarcarTodas" class="btn-notif-acao" title="Marcar todas como lidas">
                <i class="fas fa-check-double"></i> Marcar todas como lidas
            </button>
            <button id="btnLimparTodas" class="btn-notif-acao danger" title="Limpar tudo">
                <i class="fas fa-trash"></i> Limpar tudo
            </button>
        </div>
    </div>

    <div id="notificacoes-lista"></div>

    <p id="sem-notificacoes" class="notif-vazio" style="display:none;">
        <i class="fas fa-bell-slash"></i><br>
        Nenhuma notificação por enquanto.
    </p>

</div>

<script src="/js/auth/auth.js"></script>
<script src="/js/notificacoes/notificacoes.js"></script>

</body>
</html>
