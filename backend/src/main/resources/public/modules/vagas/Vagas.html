<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Vagas | WorkConnection</title>

    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilos Customizados -->
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/home/style.home.css"> <!-- Reutilizando estilos da home -->
    <link rel="stylesheet" href="/css/vagas/styleVagas.css">

    <script src="/js/components/topbar.js" defer></script>
</head>
<body>

    <div class="home-wrapper">
        <div class="container">
            <!-- Atributo data-view="user" garante que o JS liste apenas as SUAS vagas -->
            <div id="vagas-container" data-view="user"></div>
        </div>
    </div>

    <!-- Botão Flutuante Padronizado -->
    <button class="botao-publicar" id="btnNovaVaga" title="Nova Publicação">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth/auth.js"></script>
    <script src="/js/components/modal-vaga.js"></script>
    <script src="/js/vagas/criarVaga.js"></script>

</body>
</html>
