<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Workonnection</title>
  <link rel="stylesheet" href="2-Paginas/Login/styleLogin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="container">
    <div class="left">
      <img src="https://www.netzpiloten.de/wp-content/uploads/2021/01/work-life-balance-home-office-1000x1000-1.jpg" alt="ImagemLogin">
    </div>

    <div class="right">
      <div class="login-form-box">
        <img src="/6-Imagens/Logo Workonnection.png" alt="LogoWorkonnection" class="logoLogin">

        <!-- Feedback igual React -->
        <div id="feedback" class="feedback" style="display: none;"></div>

        <form id="loginForm">
          <input type="email" id="email" placeholder="Digite seu E-mail" required>
          <input type="password" id="senha" placeholder="Digite sua Senha" required>
          <button type="submit">➜ Entrar</button>
        </form>

        <p class="cadastro">
          Não é cadastrado?
          <a href="/2-Paginas/Cadastro/Cadastro.html">Cadastre-se</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/4-LocalStorage/login.js"></script>
</body>
</html>
